name: Check for libvhdi input updates

on:
  schedule:
    - cron: '20 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run update detection and validation without creating a pull request"
        required: false
        default: false
        type: boolean

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix (optional)
        if: env.CACHIX_CACHE_NAME != '' && env.CACHIX_AUTH_TOKEN != ''
        env:
          CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}
        continue-on-error: true

      - name: Update libvhdi flake input
        run: nix flake lock --update-input libvhdi

      - name: Detect changes
        id: detect
        run: |
          if git diff --quiet -- flake.lock; then
            echo "update_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          new_rev=$(jq -r '.nodes.libvhdi.locked.rev' flake.lock)
          short_rev=$(printf '%s' "$new_rev" | cut -c1-7)

          echo "update_available=true" >> "$GITHUB_OUTPUT"
          echo "new_rev=$new_rev" >> "$GITHUB_OUTPUT"
          echo "short_rev=$short_rev" >> "$GITHUB_OUTPUT"
          echo "branch_name=update/libvhdi-input-$short_rev" >> "$GITHUB_OUTPUT"

      - name: Validate updated libvhdi input
        if: steps.detect.outputs.update_available == 'true'
        run: nix build .#libvhdi -L

      - name: Report dry run result
        if: steps.detect.outputs.update_available == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: |
          echo "Dry run detected an updated libvhdi input at ${{
            steps.detect.outputs.new_rev
          }}."
          echo "Validation succeeded and no pull request was created."

      - name: Create GitHub App token
        id: app_token
        if: steps.detect.outputs.update_available == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.UPDATE_GITHUB_APP_ID }}
          private-key: ${{ secrets.UPDATE_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create Pull Request
        id: create_pr
        if: steps.detect.outputs.update_available == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') && steps.app_token.outcome == 'success'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app_token.outputs.token }}
          commit-message: "libvhdi: update flake input to ${{ steps.detect.outputs.short_rev }}"
          title: "libvhdi: update flake input to ${{ steps.detect.outputs.short_rev }}"
          body: |
            Automated update to the `libvhdi` flake input.

            Changes include:
            - `flake.lock`

            Locked revision:
            - `NiXOA/libvhdi@${{ steps.detect.outputs.new_rev }}`

            Validation:
            - `nix build .#libvhdi -L`
            - built outputs will be pushed to Cachix when `CACHIX_CACHE_NAME` and `CACHIX_AUTH_TOKEN` are configured
          branch: ${{ steps.detect.outputs.branch_name }}
          add-paths: |
            flake.lock
          delete-branch: true

      - name: Report PR result
        if: steps.detect.outputs.update_available == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')
        run: |
          branch_name="${{ steps.detect.outputs.branch_name }}"
          compare_url="https://github.com/${{ github.repository }}/compare/main...${branch_name}?expand=1"
          pull_url="https://github.com/${{ github.repository }}/pull/new/${branch_name}"

          if [ "${{ steps.app_token.outcome }}" != "success" ]; then
            echo "GitHub App token creation failed." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Configure the GitHub App credentials before rerunning this workflow:" >> "$GITHUB_STEP_SUMMARY"
            echo "- Variable: \`UPDATE_GITHUB_APP_ID\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Secret: \`UPDATE_GITHUB_APP_PRIVATE_KEY\`" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::GitHub App token creation failed. Verify UPDATE_GITHUB_APP_ID, UPDATE_GITHUB_APP_PRIVATE_KEY, and the app installation."
          elif [ "${{ steps.create_pr.outcome }}" = "success" ]; then
            echo "Automated pull request step succeeded." >> "$GITHUB_STEP_SUMMARY"
            if [ -n "${{ steps.create_pr.outputs.pull-request-url }}" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "Pull request: ${{ steps.create_pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "Automated pull request creation is not permitted in this repository." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The update branch was pushed successfully and is ready for manual review." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Branch: \`${branch_name}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Open PR: ${pull_url}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Compare diff: ${compare_url}" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Automatic pull request creation was blocked. Open a PR manually from ${pull_url}"
          fi
