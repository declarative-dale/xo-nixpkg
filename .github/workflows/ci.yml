# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [ main, master, beta ]
  pull_request:
    branches: [ main, master, beta ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - xen-orchestra-ce
          - libvhdi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix (optional)
        uses: cachix/cachix-action@v15
        with:
          name: your-cachix-cache
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Build ${{ matrix.package }}
        run: nix build .#${{ matrix.package }} -L

      - name: Test binary execution
        run: |
          if [ "${{ matrix.package }}" = "xen-orchestra-ce" ]; then
            ./result/bin/xo-server --help || echo "xo-server help output (may require runtime config)"
          elif [ "${{ matrix.package }}" = "libvhdi" ]; then
            ./result/bin/vhdiinfo --version
            ./result/bin/vhdimount --version
          fi

  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run flake checks
        run: nix flake check -L
