# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [ main, master, beta ]
  pull_request:
    branches: [ main, master, beta ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - xen-orchestra-ce
          - libvhdi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix (optional)
        uses: cachix/cachix-action@v15
        with:
          name: your-cachix-cache
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Build ${{ matrix.package }}
        run: |
          if [ "${{ matrix.package }}" = "xen-orchestra-ce" ]; then
            for attempt in 1 2 3; do
              if nix build .#xen-orchestra-ce -L; then
                exit 0
              fi

              if [ "$attempt" -eq 3 ]; then
                echo "xen-orchestra-ce build failed after $attempt attempts" >&2
                exit 1
              fi

              echo "Retrying xen-orchestra-ce build after transient failure (attempt $attempt failed)..." >&2
              sleep $((attempt * 15))
            done
          else
            nix build .#${{ matrix.package }} -L
          fi

      - name: Test binary execution
        run: |
          if [ "${{ matrix.package }}" = "xen-orchestra-ce" ]; then
            ./result/bin/xo-server --help || echo "xo-server help output (may require runtime config)"
          fi

  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run flake checks
        run: nix flake check --no-build
