name: Maintain release alias tags

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to use, for example v6.3.1"
        required: true
        type: string

jobs:
  update-aliases:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.UPDATE_GITHUB_APP_ID }}
          private-key: ${{ secrets.UPDATE_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-workflows: write

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release and alias targets
        id: resolve
        env:
          DISPATCH_TAG_NAME: ${{ github.event.inputs.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            source_tag="$DISPATCH_TAG_NAME"
          else
            source_tag="$PUSH_TAG_NAME"
          fi

          if ! printf '%s\n' "$source_tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Expected a release tag in the form vX.X.X, got: $source_tag" >&2
            exit 1
          fi

          git fetch --force --tags origin

          source_commit=$(git rev-list -n 1 "$source_tag")
          stable_tag=$(
            git tag --list 'v*.*.*' --sort=version:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | awk -v source_tag="$source_tag" '
                  $0 == source_tag {
                    print previous_tag
                    exit
                  }
                  { previous_tag = $0 }
                ' || true
          )

          echo "source_tag=$source_tag" >> "$GITHUB_OUTPUT"
          echo "source_commit=$source_commit" >> "$GITHUB_OUTPUT"

          if [ -n "$stable_tag" ]; then
            stable_commit=$(git rev-list -n 1 "$stable_tag")
            echo "stable_tag=$stable_tag" >> "$GITHUB_OUTPUT"
            echo "stable_commit=$stable_commit" >> "$GITHUB_OUTPUT"
          fi

      - name: Update alias tags
        env:
          SOURCE_COMMIT: ${{ steps.resolve.outputs.source_commit }}
          SOURCE_TAG: ${{ steps.resolve.outputs.source_tag }}
          STABLE_COMMIT: ${{ steps.resolve.outputs.stable_commit }}
          STABLE_TAG: ${{ steps.resolve.outputs.stable_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f latest "$SOURCE_COMMIT"

          if [ -n "$STABLE_TAG" ]; then
            git tag -f stable "$STABLE_COMMIT"
            git push --force origin refs/tags/latest refs/tags/stable
          else
            git push --force origin refs/tags/latest
          fi

      - name: Summarize alias targets
        run: |
          {
            echo "Updated release aliases."
            echo ""
            echo "- latest -> \`${{ steps.resolve.outputs.source_tag }}\` (\`${{ steps.resolve.outputs.source_commit }}\`)"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.resolve.outputs.stable_tag }}" ]; then
            echo "- stable -> \`${{ steps.resolve.outputs.stable_tag }}\` (\`${{ steps.resolve.outputs.stable_commit }}\`)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- stable unchanged because no previous vX.X.X series was found" >> "$GITHUB_STEP_SUMMARY"
          fi
