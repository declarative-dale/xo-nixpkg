name: Check for XO updates

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run updater script
        run: |
          chmod +x ./scripts/update.sh
          ./scripts/update.sh

      - name: Detect changes
        id: detect
        run: |
          if git diff --quiet -- default.nix; then
            echo "update_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          new_version=$(grep 'version = ' default.nix | sed 's/.*version = "\([^"]*\)".*/\1/')
          new_rev=$(grep 'rev = ' default.nix | sed 's/.*rev = "\([a-f0-9]*\)".*/\1/')

          echo "update_available=true" >> "$GITHUB_OUTPUT"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "new_rev=$new_rev" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.detect.outputs.update_available == 'true'
        run: |
          git config user.name "Forgejo Actions"
          git config user.email "actions@codeberg.org"

          BRANCH="update/xen-orchestra-ce-${{ steps.detect.outputs.new_version }}"

          git checkout -b "$BRANCH"
          git add default.nix
          git commit -m "xen-orchestra-ce: update to ${{ steps.detect.outputs.new_version }}"
          git push origin "$BRANCH"

          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://codeberg.org/api/v1/repos/NiXOA/xen-orchestra-ce/pulls" \
            -d '{
              "title": "xen-orchestra-ce: update to ${{ steps.detect.outputs.new_version }}",
              "body": "Automated update to xen-orchestra-ce ${{ steps.detect.outputs.new_version }}.\\n\\nUpstream commit: vatesfr/xen-orchestra@${{ steps.detect.outputs.new_rev }}\\n\\nIncludes updates for version, src hash, and yarn offline cache hash.",
              "head": "'"$BRANCH"'",
              "base": "main"
            }'
